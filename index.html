<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아침자습 출석 QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f8f6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #222;
  }
  #qr-screen { width: 100%; max-width: 520px; }
  #main-card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid #e8e8e5;
    padding: 36px 40px;
    text-align: center;
  }
  #top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
  #school-info { text-align: left; }
  #school-name { font-size: 20px; font-weight: 500; color: #111; }
  #class-name { font-size: 13px; color: #888; margin-top: 3px; }
  #clock { font-size: 36px; font-weight: 500; letter-spacing: 1px; color: #111; }
  #date-str { font-size: 13px; color: #888; text-align: right; margin-top: 3px; }
  #qr-wrap {
    display: inline-block;
    padding: 16px;
    border: 1px solid #e0e0dc;
    border-radius: 16px;
    background: #fff;
    margin-bottom: 20px;
  }
  #status-bar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
  #dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; animation: pulse 1.2s ease-in-out infinite; }
  #status-text { font-size: 14px; color: #666; }
  #timer-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
  #timer-bar-wrap { width: 200px; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
  #timer-bar { height: 100%; border-radius: 3px; background: #1D9E75; transition: width 1s linear, background 0.3s; }
  #timer-count { font-size: 13px; font-weight: 500; color: #222; min-width: 22px; }
  #controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
  .ctrl-btn {
    font-size: 13px; padding: 7px 16px;
    border-radius: 8px; border: 1px solid #ddd;
    background: transparent; color: #555; cursor: pointer;
  }
  .ctrl-btn:hover { background: #f4f4f2; }
  #config-area {
    display: none;
    border: 1px solid #eee; border-radius: 12px;
    padding: 16px 18px; background: #f8f8f6; text-align: left; margin-top: 8px;
  }
  #config-area label { font-size: 12px; color: #777; display: block; margin-bottom: 4px; margin-top: 10px; }
  #config-area label:first-child { margin-top: 0; }
  #config-area input {
    width: 100%; font-size: 13px; padding: 8px 10px;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; color: #222;
  }
  .cfg-row { display: flex; gap: 8px; }
  .cfg-row > div { flex: 1; }
  #apply-btn {
    margin-top: 14px; width: 100%; padding: 10px;
    border-radius: 8px; border: 1px solid #1D9E75;
    background: #E1F5EE; color: #085041;
    font-size: 14px; font-weight: 500; cursor: pointer;
  }
  #apply-btn:hover { background: #9FE1CB; }
  #no-url-notice { display: none; font-size: 12px; color: #E24B4A; margin-bottom: 12px; }
  #form-screen { display: none; width: 100%; max-width: 400px; }
  .form-card { background: #fff; border-radius: 16px; padding: 36px 28px; border: 1px solid #eee; }
  .form-card h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; color: #111; }
  .form-sub { font-size: 13px; color: #888; margin-bottom: 28px; }
  .form-label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
  #sid-input {
    width: 100%; padding: 12px; font-size: 22px;
    border: 1px solid #ddd; border-radius: 10px;
    margin-bottom: 20px; text-align: center; letter-spacing: 3px; color: #111;
  }
  #sid-input:focus { outline: none; border-color: #1D9E75; }
  #submit-btn {
    width: 100%; padding: 14px; background: #1D9E75;
    color: #fff; border: none; border-radius: 10px;
    font-size: 16px; cursor: pointer; font-weight: 500;
  }
  #submit-btn:disabled { background: #ccc; cursor: default; }
  #form-msg { margin-top: 12px; font-size: 13px; color: #E24B4A; text-align: center; min-height: 18px; }
  #result-screen { display: none; width: 100%; max-width: 400px; }
  .result-card { background: #fff; border-radius: 16px; padding: 48px 28px; border: 1px solid #eee; text-align: center; }
  .result-icon { font-size: 52px; margin-bottom: 20px; }
  .result-title { font-size: 24px; font-weight: 500; color: #111; margin-bottom: 10px; white-space: pre-line; }
  .result-sub { font-size: 14px; margin-top: 6px; }
  #back-btn {
    margin-top: 24px; padding: 10px 24px;
    border-radius: 8px; border: 1px solid #ddd;
    background: transparent; color: #555; font-size: 14px; cursor: pointer;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
</style>
</head>
<body>

<div id="qr-screen">
  <div id="main-card">
    <div id="top-bar">
      <div id="school-info">
        <div id="school-name">학교명</div>
        <div id="class-name">반 정보</div>
      </div>
      <div>
        <div id="clock">--:--:--</div>
        <div id="date-str">--</div>
      </div>
    </div>
    <div id="no-url-notice">설정에서 Apps Script URL을 입력해주세요</div>
    <div id="qr-wrap">
      <canvas id="qr-canvas" width="240" height="240"></canvas>
    </div>
    <div id="status-bar">
      <div id="dot"></div>
      <span id="status-text">QR 활성화됨 · 스캔하여 출석 제출</span>
    </div>
    <div id="timer-row">
      <span style="font-size:13px;color:#888">다음 갱신</span>
      <div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
      <span id="timer-count">60</span>초
    </div>
    <div id="controls">
      <button class="ctrl-btn" onclick="toggleConfig()">설정 열기 / 닫기</button>
      <button class="ctrl-btn" onclick="forceRefresh()">QR 즉시 갱신</button>
    </div>
    <div id="config-area">
      <div class="cfg-row">
        <div><label>학교명</label><input id="cfg-school" placeholder="예: 대일고등학교"></div>
        <div><label>반 정보</label><input id="cfg-class" placeholder="예: 2학년 아침자습"></div>
      </div>
      <label>Apps Script 웹앱 URL</label>
      <input id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec">
      <label>QR 갱신 주기 (초, 권장: 60)</label>
      <input id="cfg-interval" type="number" value="60" min="10" max="300">
      <button id="apply-btn" onclick="applyConfig()">적용하기</button>
    </div>
  </div>
</div>

<div id="form-screen">
  <div class="form-card">
    <h2>출석 체크</h2>
    <p class="form-sub">학번을 입력하면 자동으로 처리됩니다</p>
    <label class="form-label">학번</label>
    <input type="text" id="sid-input" inputmode="numeric" placeholder="학번 입력">
    <button id="submit-btn" onclick="submitAttendance()">출석 제출</button>
    <div id="form-msg"></div>
  </div>
</div>

<div id="result-screen">
  <div class="result-card">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub" id="result-sub"></div>
    <button id="back-btn" onclick="goBack()">돌아가기</button>
  </div>
</div>

<script>
var APPS_URL = '';
var INTERVAL = 60;
var remaining = INTERVAL;
var currentToken = '';
var configOpen = false;
var currentScreen = 'qr';

function showScreen(name) {
  document.getElementById('qr-screen').style.display = 'none';
  document.getElementById('form-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById(name + '-screen').style.display = 'block';
  currentScreen = name;
}

function loadSaved() {
  var school = localStorage.getItem('att_school') || '';
  var cls    = localStorage.getItem('att_class')  || '';
  var url    = localStorage.getItem('att_url')    || '';
  var iv     = parseInt(localStorage.getItem('att_interval')) || 60;
  if (school) document.getElementById('school-name').textContent = school;
  if (cls)    document.getElementById('class-name').textContent  = cls;
  document.getElementById('cfg-school').value   = school;
  document.getElementById('cfg-class').value    = cls;
  document.getElementById('cfg-url').value      = url;
  document.getElementById('cfg-interval').value = iv;
  APPS_URL = url;
  INTERVAL = iv;
  remaining = iv;
  document.getElementById('no-url-notice').style.display = url ? 'none' : 'block';
}

function makeToken() {
  return Math.floor(Date.now() / 1000).toString(36);
}

function drawQR() {
  var pageUrl = 'https://honghyeyeon-daeil.github.io/attendance/';
  var url = APPS_URL
    ? pageUrl + '?token=' + currentToken + '&api=' + encodeURIComponent(APPS_URL)
    : pageUrl + '?token=설정필요';
  var canvas = document.getElementById('qr-canvas');
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 240, 240);
  var tmp = document.createElement('div');
  try {
    new QRCode(tmp, {
      text: url, width: 240, height: 240,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    setTimeout(function() {
      var el = tmp.querySelector('canvas') || tmp.querySelector('img');
      if (!el) return;
      if (el.tagName === 'CANVAS') {
        ctx.drawImage(el, 0, 0, 240, 240);
      } else {
        var i = new Image();
        i.onload = function() { ctx.drawImage(i, 0, 0, 240, 240); };
        i.src = el.src;
      }
    }, 150);
  } catch(e) {}
}

function refresh() {
  currentToken = makeToken();
  drawQR();
  remaining = INTERVAL;
  document.getElementById('timer-bar').style.width = '100%';
}

function forceRefresh() { refresh(); }

function toggleConfig() {
  configOpen = !configOpen;
  document.getElementById('config-area').style.display = configOpen ? 'block' : 'none';
}

function applyConfig() {
  var school = document.getElementById('cfg-school').value.trim() || '학교명';
  var cls    = document.getElementById('cfg-class').value.trim()  || '반 정보';
  var url    = document.getElementById('cfg-url').value.trim();
  var iv     = Math.max(10, Math.min(300, parseInt(document.getElementById('cfg-interval').value) || 60));
  document.getElementById('school-name').textContent = school;
  document.getElementById('class-name').textContent  = cls;
  document.getElementById('no-url-notice').style.display = url ? 'none' : 'block';
  localStorage.setItem('att_school',   school);
  localStorage.setItem('att_class',    cls);
  localStorage.setItem('att_url',      url);
  localStorage.setItem('att_interval', iv);
  APPS_URL = url;
  INTERVAL = iv;
  remaining = iv;
  refresh();
  toggleConfig();
}

function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  var days = ['일','월','화','수','목','금','토'];
  document.getElementById('date-str').textContent =
    now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일 (' + days[now.getDay()] + ')';
}

function tick() {
  updateClock();
  if (currentScreen !== 'qr') return;
  remaining--;
  if (remaining <= 0) refresh();
  var pct = Math.max(0, Math.round((remaining / INTERVAL) * 100));
  var bar = document.getElementById('timer-bar');
  bar.style.width = pct + '%';
  bar.style.background = remaining <= 10 ? '#E24B4A' : '#1D9E75';
  document.getElementById('timer-count').textContent = Math.max(0, remaining);
}

function showForm(token, apiUrl) {
  currentToken = token;
  if (apiUrl) APPS_URL = apiUrl;
  document.getElementById('sid-input').value = '';
  document.getElementById('form-msg').textContent = '';
  document.getElementById('submit-btn').disabled = false;
  showScreen('form');
  setTimeout(function() { document.getElementById('sid-input').focus(); }, 100);
}

function submitAttendance() {
  var sid = document.getElementById('sid-input').value.trim();
  if (!sid) { document.getElementById('form-msg').textContent = '학번을 입력해주세요.'; return; }
  if (!APPS_URL) { document.getElementById('form-msg').textContent = '설정에서 URL을 입력해주세요.'; return; }

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('form-msg').textContent = '확인 중...';

  var cbName = 'cb_' + Math.random().toString(36).slice(2);
  var script = document.createElement('script');
  var done = false;

  window[cbName] = function(data) {
    done = true;
    delete window[cbName];
    if (document.body.contains(script)) document.body.removeChild(script);
    handleResult(data);
  };

  script.onerror = function() {
    if (done) return;
    done = true;
    delete window[cbName];
    if (document.body.contains(script)) document.body.removeChild(script);
    document.getElementById('form-msg').textContent = '오류가 발생했습니다. 다시 시도해주세요.';
    document.getElementById('submit-btn').disabled = false;
  };

  script.src = APPS_URL
    + '?callback=' + encodeURIComponent(cbName)
    + '&t=' + encodeURIComponent(currentToken)
    + '&sid=' + encodeURIComponent(sid);
  document.body.appendChild(script);
}

function handleResult(data) {
  if (data.status === 'OK') {
    showResult('✅', data.name + '님\n출석 완료!', '학번 · 이름 · 아침 출석 체크 완료', '#1D9E75');
  } else if (data.status === 'DUPLICATE') {
    showResult('⚠️', '이미 출석했습니다', data.name + '님은 오늘 이미 체크되었어요', '#888');
  } else if (data.status === 'NOT_FOUND') {
    document.getElementById('form-msg').textContent = '등록되지 않은 학번입니다. 선생님께 문의하세요.';
    document.getElementById('submit-btn').disabled = false;
  } else if (data.status === 'EXPIRED') {
    showResult('⏱️', 'QR이 만료되었습니다', '교실 화면의 QR을 다시 스캔해주세요', '#E24B4A');
  } else {
    document.getElementById('form-msg').textContent = '오류가 발생했습니다. 다시 시도해주세요.';
    document.getElementById('submit-btn').disabled = false;
  }
}

function showResult(icon, title, sub, color) {
  document.getElementById('result-icon').textContent = icon;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('result-sub').style.color = color;
  showScreen('result');
}

function goBack() {
  document.getElementById('sid-input').value = '';
  document.getElementById('form-msg').textContent = '';
  document.getElementById('submit-btn').disabled = false;
  showScreen('form');
}

function checkUrlParams() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var api = params.get('api');
  if (token && token !== '설정필요') {
    var apiUrl = api ? decodeURIComponent(api) : APPS_URL;
    history.replaceState(null, '', window.location.pathname);
    showForm(token, apiUrl);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && currentScreen === 'form') {
    submitAttendance();
  }
});

loadSaved();
refresh();
updateClock();
setInterval(tick, 1000);
checkUrlParams();
</script>
</body>
</html>
